name: luci-app-substore-ipk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src

      - name: Auto increment package version
        run: |
          if [ -f src/luci-app-substore/Makefile ]; then
            sed -i 's/PKG_VERSION:=.*/PKG_VERSION:=2.9.${{ github.run_number }}/g' src/luci-app-substore/Makefile
            echo "Successfully updated PKG_VERSION to: 2.9.${{ github.run_number }}"
            grep "PKG_VERSION:=" src/luci-app-substore/Makefile
          else
            echo "Warning: Makefile not found in src/ directory!"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Download OpenWrt SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Setup feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update luci
          ./scripts/feeds install -a -p luci

      - name: Copy package
        run: |
          cp -r src/luci-app-substore openwrt-sdk/package/luci-app-substore
          ls openwrt-sdk/package/luci-app-substore/

      - name: Build
        run: |
          cd openwrt-sdk
          make defconfig
          if ! make package/luci-app-substore/compile V=s > build.log 2>&1; then
            echo "=== 编译失败，日志最后 150 行 ==="
            tail -150 build.log
            exit 1
          fi
          tail -50 build.log

      - name: Collect IPK
        run: |
          mkdir -p output
          find openwrt-sdk/bin -name "luci-app-substore*.ipk" -exec cp {} output/ \;
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-substore-all
          path: output/*.ipk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.9.${{ github.run_number }}
          name: luci-app-substore
          files: output/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
