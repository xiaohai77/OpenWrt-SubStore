name: Build luci-app-substore IPK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Setup feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update luci
          ./scripts/feeds install -a -p luci

      - name: Copy package
        run: |
          cp -r $GITHUB_WORKSPACE openwrt-sdk/package/luci-app-substore

      - name: Build
        run: |
          cd openwrt-sdk
          make package/luci-app-substore/compile V=s 2>&1 | tail -30

      - name: Collect IPK
        run: |
          mkdir -p output
          find openwrt-sdk/bin -name "luci-app-substore*.ipk" -exec cp {} output/ \;
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-substore-all
          path: output/*.ipk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: output/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
