name: release-pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: "强制执行（勾选后跳过版本比对，强制触发）"
        type: boolean
        default: false

concurrency:
  group: substore-release-pipeline
  cancel-in-progress: false

jobs:
  check-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream versions (backend + frontend)
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BACKEND_LATEST=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/sub-store-org/Sub-Store/releases/latest | jq -r .tag_name)
          FRONTEND_LATEST=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/sub-store-org/Sub-Store-Front-End/releases/latest | jq -r .tag_name)

          BACKEND_CACHED=$(cat .last-substore-backend-version 2>/dev/null || echo "none")
          FRONTEND_CACHED=$(cat .last-substore-frontend-version 2>/dev/null || echo "none")

          echo "后端 上游最新: $BACKEND_LATEST / 上次记录: $BACKEND_CACHED"
          echo "前端 上游最新: $FRONTEND_LATEST / 上次记录: $FRONTEND_CACHED"

          if [ "$BACKEND_LATEST" != "$BACKEND_CACHED" ] || [ "$FRONTEND_LATEST" != "$FRONTEND_CACHED" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            if [ "${{ inputs.force }}" = "true" ]; then
              echo "（强制模式：即使版本没变化，也继续走完整流程）"
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

          echo "backend_latest=$BACKEND_LATEST" >> $GITHUB_OUTPUT
          echo "frontend_latest=$FRONTEND_LATEST" >> $GITHUB_OUTPUT

      - name: Resolve shared version
        if: steps.check.outputs.changed == 'true'
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_DEPLOY_RUN=$(gh run list --workflow=pages-deploy.yml --limit 1 --json number --jq '.[0].number // 0')
          NEXT=$((LAST_DEPLOY_RUN + 1))
          VERSION="2.9.$NEXT"
          echo "本次统一版本号: $VERSION（跟着下一次 pages-deploy.yml 的运行序号走）"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Trigger APK build
        if: steps.check.outputs.changed == 'true'
        id: trigger_apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -u -d '-30 seconds' +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run substore-apk.yml \
            -f version="${{ steps.ver.outputs.version }}" \
            -f backend_tag="${{ steps.check.outputs.backend_latest }}" \
            -f frontend_tag="${{ steps.check.outputs.frontend_latest }}"

          run_id=""
          for i in $(seq 1 24); do
            sleep 5
            run_id=$(gh run list --workflow=substore-apk.yml --json databaseId,createdAt,event \
              --jq "[.[] | select(.event==\"workflow_dispatch\" and .createdAt >= \"$SINCE\")] | sort_by(.createdAt) | .[0].databaseId // empty")
            if [ -n "$run_id" ]; then
              echo "定位到本次触发的 APK run: $run_id"
              break
            fi
            echo "还没找到本次触发的 APK run，重试中...（第 $i 次）"
          done

          if [ -z "$run_id" ]; then
            echo "错误: 轮询超时，未能定位到本次触发的 APK run" >&2
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Wait for APK build
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run watch "${{ steps.trigger_apk.outputs.run_id }}" --exit-status

      - name: Trigger IPK build
        if: steps.check.outputs.changed == 'true'
        id: trigger_ipk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -u -d '-30 seconds' +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run substore-ipk.yml \
            -f version="${{ steps.ver.outputs.version }}" \
            -f backend_tag="${{ steps.check.outputs.backend_latest }}" \
            -f frontend_tag="${{ steps.check.outputs.frontend_latest }}"

          run_id=""
          for i in $(seq 1 24); do
            sleep 5
            run_id=$(gh run list --workflow=substore-ipk.yml --json databaseId,createdAt,event \
              --jq "[.[] | select(.event==\"workflow_dispatch\" and .createdAt >= \"$SINCE\")] | sort_by(.createdAt) | .[0].databaseId // empty")
            if [ -n "$run_id" ]; then
              echo "定位到本次触发的 IPK run: $run_id"
              break
            fi
            echo "还没找到本次触发的 IPK run，重试中...（第 $i 次）"
          done

          if [ -z "$run_id" ]; then
            echo "错误: 轮询超时，未能定位到本次触发的 IPK run" >&2
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Wait for IPK build
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run watch "${{ steps.trigger_ipk.outputs.run_id }}" --exit-status

      - name: Update cached version files
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ steps.check.outputs.backend_latest }}" > .last-substore-backend-version
          echo "${{ steps.check.outputs.frontend_latest }}" > .last-substore-frontend-version
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .last-substore-backend-version .last-substore-frontend-version
          if git diff --cached --quiet; then
            echo "版本号没有变化，跳过提交（强制模式下属于正常情况)"
          else
            git commit -m "chore: bump cached Sub-Store versions (backend ${{ steps.check.outputs.backend_latest }}, frontend ${{ steps.check.outputs.frontend_latest }}), release v${{ steps.ver.outputs.version }}"
            git push
          fi

      - name: Trigger pages-deploy to Cloudflare (publish build artifacts)
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run pages-deploy.yml
