name: release-pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   
  workflow_dispatch:
    inputs:
      force:
        description: "强制执行（勾选后跳过版本比对，即使上游没更新也会走完整流程，调试用）"
        type: boolean
        default: false

jobs:
  check-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream versions (backend + frontend)
        id: check
        run: |
          BACKEND_LATEST=$(curl -s https://api.github.com/repos/sub-store-org/Sub-Store/releases/latest | jq -r .tag_name)
          FRONTEND_LATEST=$(curl -s https://api.github.com/repos/sub-store-org/Sub-Store-Front-End/releases/latest | jq -r .tag_name)

          BACKEND_CACHED=$(cat .last-substore-backend-version 2>/dev/null || echo "none")
          FRONTEND_CACHED=$(cat .last-substore-frontend-version 2>/dev/null || echo "none")

          echo "后端 上游最新: $BACKEND_LATEST / 上次记录: $BACKEND_CACHED"
          echo "前端 上游最新: $FRONTEND_LATEST / 上次记录: $FRONTEND_CACHED"

          if [ "$BACKEND_LATEST" != "$BACKEND_CACHED" ] || [ "$FRONTEND_LATEST" != "$FRONTEND_CACHED" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            if [ "${{ inputs.force }}" = "true" ]; then
              echo "（强制模式：即使版本没变化，也继续走完整流程）"
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

          echo "backend_latest=$BACKEND_LATEST" >> $GITHUB_OUTPUT
          echo "frontend_latest=$FRONTEND_LATEST" >> $GITHUB_OUTPUT

      - name: Update cached version files
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ steps.check.outputs.backend_latest }}" > .last-substore-backend-version
          echo "${{ steps.check.outputs.frontend_latest }}" > .last-substore-frontend-version
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .last-substore-backend-version .last-substore-frontend-version
          # 强制模式下版本号可能跟缓存文件完全一样，没有实际改动可提交，
          # git commit 在这种情况下会报错退出，所以先判断有没有真的改动。
          if git diff --cached --quiet; then
            echo "版本号没有变化，跳过提交（强制模式下属于正常情况)"
          else
            git commit -m "chore: bump cached Sub-Store versions (backend ${{ steps.check.outputs.backend_latest }}, frontend ${{ steps.check.outputs.frontend_latest }})"
            git push
          fi

      # 2026-07 修复：之前这里在触发 ipk/apk 编译前，要先手动跑一次
      # deploy.yml 把 sub-store.bundle.js / dist.zip 预热到 Cloudflare，
      # 是因为当时 Makefile 里编译期下载是"镜像优先、官方源兜底"——镜像不
      # 提前刷新，编译时拿到的就是上一轮的旧内容。现在 Makefile 已经改成
      # "官方源优先、镜像仅兜底"，编译期直接连 GitHub 官方源拿最新内容，
      # 不再依赖 Cloudflare 镜像是否提前刷新，这一步预热+轮询也就不需要了。
      # /assets/ 镜像仍然会在下面 deploy.yml 里刷新，只是不再需要抢在编译
      # 之前完成。

      - name: Trigger IPK and APK builds
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run substore-ipk.yml
          gh workflow run substore-apk.yml
          sleep 15

      - name: Wait for both builds to finish
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 60); do
            IPK_STATUS=$(gh run list --workflow=substore-ipk.yml --limit 1 --json status,conclusion --jq '.[0]')
            APK_STATUS=$(gh run list --workflow=substore-apk.yml --limit 1 --json status,conclusion --jq '.[0]')
            IPK_DONE=$(echo "$IPK_STATUS" | jq -r '.status == "completed"')
            APK_DONE=$(echo "$APK_STATUS" | jq -r '.status == "completed"')
            echo "IPK: $IPK_STATUS"
            echo "APK: $APK_STATUS"
            if [ "$IPK_DONE" = "true" ] && [ "$APK_DONE" = "true" ]; then
              echo "两个编译都完成了"
              break
            fi
            echo "还在编译中，等待30秒..."
            sleep 30
          done

      # 编译完成后再跑一次 deploy.yml：这次是发布真正的产物——把刚编译好
      # 的 .ipk/.apk 签名、生成索引、推到 Cloudflare。顺带再刷一次
      # /assets/ 镜像也没有坏处（内容和预热时一致，纯粹是幂等操作）。
      - name: Trigger deploy to Cloudflare (publish build artifacts)
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml
