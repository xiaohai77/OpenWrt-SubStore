name: luci-app-substore-ipk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Download OpenWrt SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Setup feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update luci
          ./scripts/feeds install -a -p luci

      - name: Download Sub-Store backend and frontend
        run: |
          mkdir -p src/root/usr/libexec/substore
          mkdir -p src/root/www/sub-store
          echo "Downloading backend..."
          wget -q -O src/root/usr/libexec/substore/sub-store.bundle.js \
            https://github.com/sub-store-org/Sub-Store/releases/latest/download/sub-store.bundle.js
          echo "Backend size: $(du -sh src/root/usr/libexec/substore/sub-store.bundle.js)"
          echo "Downloading frontend..."
          wget -q -O /tmp/dist.zip \
            https://github.com/sub-store-org/Sub-Store-Front-End/releases/latest/download/dist.zip
          unzip -q /tmp/dist.zip -d src/root/www/sub-store
          echo "Frontend size: $(du -sh src/root/www/sub-store/dist)"

      - name: Copy package
        run: |
          cp -r src openwrt-sdk/package/luci-app-substore
          ls openwrt-sdk/package/luci-app-substore/

      - name: Build
        run: |
          cd openwrt-sdk
          make defconfig
          make package/luci-app-substore/compile V=s 2>&1 | tail -50

      - name: Collect IPK
        run: |
          mkdir -p output
          find openwrt-sdk/bin -name "luci-app-substore*.ipk" -exec cp {} output/ \;
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-substore-all
          path: output/*.ipk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: luci-app-substore
          files: output/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare signing key
        run: |
          echo "${{ secrets.IPK_SIGN_KEY }}" > /tmp/ipk-sign.key

      - name: Locate usign tool
        run: |
          USIGN_BIN=$(find openwrt-sdk -type f -name usign -path "*/host/bin/*" | head -n1)
          echo "USIGN_BIN=$USIGN_BIN" >> $GITHUB_ENV
          echo "找到 usign: $USIGN_BIN"

      - name: Build signed repo index
        run: |
          set -e
          sudo ln -sf $(which sha256sum) /usr/local/bin/sha256
          REPO_DIR=repo-new/openwrt-23.05/x86_64
          mkdir -p "$REPO_DIR"
          cp output/*.ipk "$REPO_DIR/"
          cd "$REPO_DIR"
          "$GITHUB_WORKSPACE/openwrt-sdk/scripts/ipkg-make-index.sh" . > Packages
          gzip -kf Packages
          "$GITHUB_WORKSPACE/$USIGN_BIN" -S -m Packages -s /tmp/ipk-sign.key -x Packages.sig
          ls -lh

      - name: Merge with existing live site
        run: |
          mkdir -p site
          wget -r -np -nH --cut-dirs=0 -P site \
            "https://substore-openwrt.pages.dev/" 2>/dev/null || echo "首次合并，忽略错误"
          mkdir -p site
          cp -r repo-new/openwrt-23.05 site/
          cp src/keys/ipk-sign.pub site/ipk-sign.pub
          ls -R site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: substore-openwrt
          directory: site
          branch: main

      - name: Cleanup key
        run: |
          shred -u /tmp/ipk-sign.key 2>/dev/null || rm -f /tmp/ipk-sign.key
